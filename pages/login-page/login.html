<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://kit.fontawesome.com/30e49b2023.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../../assets/style.css" />
  <link rel="stylesheet" href="../../assets/common.css" />
  <link rel="stylesheet" href="../../components/header/header.css" />
  <link rel="stylesheet" href="../../components/content-left/content-left.css" />
  <link rel="stylesheet" href="./login.css" />
</head>

<body>
  <div data-include="../../components/header/header.html"></div>
  <main>
    <div class="main_content">
      <div class="content_left" data-include="../../components/content-left/content-left.html"></div>

      <div class="content_right">
        <form class="form_content" id="form">
          <h2>Welcome back</h2>

          <p>Sign in to continue to your workspace.</p>

          <div class="form_item btn btn_signin_box">
            <button class="btn_gg" type="button">
              <img src="../../assets/img/gg.png" alt="" />Continue with Google
            </button>
            <button class="btn_git" type="button">
              <img src="../../assets/img/git.png" alt="" />Continue with Github
            </button>
          </div>

          <div class="form_item separate">
            <hr />
            <span>or sign in with email</span>
            <hr />
          </div>

          <div class="form_item input_box">
            <label for="email">Email:</label><br />
            <input type="text" id="email" name="email" placeholder="Enter your email" />
            <div class="error"></div>
          </div>

          <div class="form_item input_box">
            <label for="password">Password:</label><br />
            <input type="password" id="password" name="password" placeholder="Enter your password" />
            <div class="error"></div>
          </div>

          <div class="form_item checkbox">
            <div>
              <input type="checkbox" id="" name="" value="" />
              <label for="">Remember me</label>
            </div>
            <a href="">Forgot password?</a>
          </div>

          <div class="form_item btn btn_submit">
            <button type="submit">Sign in</button>
          </div>

          <div class="form_item sign_up">
            <p>
              Don't have an account?<a href="../register-page/register.html">Sign up</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script type="module" src="./login.js"></script>
  <script type="module" src="../../assets/js/responsive.js"></script>
  <script type="module" src="../../assets/js/include.js"></script>
</body>

</html>
